<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D-Doc | เข้าสู่ระบบ</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    @font-face { font-family:"Prompt"; font-weight:400; src:url("/static/fonts/Prompt-Regular.ttf") format("truetype"); }
    @font-face { font-family:"Prompt"; font-weight:600; src:url("/static/fonts/Prompt-SemiBold.ttf") format("truetype"); }
    @font-face { font-family:"Prompt"; font-weight:700; src:url("/static/fonts/Prompt-Bold.ttf") format("truetype"); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:"Prompt","Sarabun","Leelawadee UI","Segoe UI",sans-serif;
      background:linear-gradient(135deg,#3568e0,#4880FF 55%,#6f9bff); color:#202224; padding:20px; }
    .card { background:#fff; width:100%; max-width:380px; border-radius:18px; padding:34px 30px;
      box-shadow:0 20px 50px rgba(16,24,40,.30); }
    .brand { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:22px; }
    .brand img { width:64px; height:64px; object-fit:contain; }
    .brand .name { font-size:26px; font-weight:800; letter-spacing:.3px; }
    .brand .sub { font-size:14px; color:#7b8190; }
    label { display:block; margin:14px 0 5px; font-weight:600; font-size:15px; }
    input { width:100%; padding:11px 13px; border:1px solid #dfe3ea; border-radius:10px; font-size:16px;
      font-family:inherit; }
    input:focus { outline:none; border-color:#4880FF; box-shadow:0 0 0 3px rgba(72,128,255,.18); }
    .btn { width:100%; margin-top:22px; background:#4880FF; color:#fff; border:none; padding:12px;
      border-radius:11px; font-size:17px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn:hover { background:#3568e0; }
    .err { background:#fde8e8; color:#b91c1c; border:1px solid #f7caca; padding:10px 13px;
      border-radius:10px; font-size:14.5px; margin-bottom:6px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="brand">
      <img src="/static/logo.png" alt="D-Doc">
      <span class="name">D-Doc</span>
      <span class="sub">ระบบจัดการเอกสารและพัสดุโรงเรียน</span>
    </div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>ชื่อผู้ใช้</label>
    <input name="username" autocomplete="username" required autofocus>
    <label>รหัสผ่าน</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button class="btn" type="submit">เข้าสู่ระบบ</button>
  </form>
</body>
</html>
