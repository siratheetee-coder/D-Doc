{% extends "base.html" %}
{% block title %}สร้างใบเบิกวัสดุ{% endblock %}
{% block content %}
<datalist id="reqpersons">{% for p in persons %}<option value="{{ p.name }}">{% endfor %}</datalist>
<datalist id="reqdepts">{% for d in departments %}<option value="{{ d.name }}">{% endfor %}</datalist>

<div class="card">
  <h1>สร้างใบเบิกวัสดุ</h1>
  <form method="post" action="/requisitions/new">
    <div class="row">
      <div><label>เลขที่ใบเบิก</label><input name="req_no" placeholder="เช่น 1/2569"></div>
      <div><label>วันที่</label><input name="date" value="{{ today_thai }}" placeholder="วว/ดด/ปปปป" data-date="1"></div>
      <div><label>ผู้ขอเบิก</label><input name="requester" list="reqpersons"></div>
      <div><label>ฝ่าย/งาน</label><input name="department" list="reqdepts"></div>
    </div>
    <label>เพื่อใช้ในงาน/โครงการ</label>
    <input name="purpose" placeholder="เช่น งานธุรการประจำเดือน">

    <h2 style="margin-top:18px;">รายการที่ขอเบิก</h2>
    <div style="border:1px solid #c7d7fb; background:#f5f9ff; border-radius:10px; padding:12px 14px; margin-bottom:12px;">
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <span class="muted" style="font-size:13px;"><svg class="icon"><use href="#ic-ai"/></svg> สแกนรูปรายการของที่ขอเบิก ระบบจะอ่านมาเติมตารางให้:</span>
        <label class="btn gray sm" style="cursor:pointer;">
          <svg class="icon"><use href="#ic-upload"/></svg> ถ่ายรูป (อ่านเร็ว)
          <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="reqScan(this,'/procurement/ocr-items','กำลังอ่านรูป (OCR)...')">
        </label>
        <label class="btn sm" style="cursor:pointer; background:linear-gradient(120deg,#7c3aed,#4880FF); color:#fff; border:none;">
          <svg class="icon"><use href="#ic-ai"/></svg> ให้ AI ช่วยอ่าน
          <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="reqScan(this,'/procurement/ai-items','กำลังให้ AI อ่านรูป...')">
        </label>
        <span id="reqScanMsg" class="muted" style="font-size:13px;"></span>
      </div>
    </div>
    <table id="itemtbl">
      <thead><tr><th style="width:45%;">วัสดุ</th><th>จำนวน</th><th>หน่วย</th><th>คงเหลือ</th><th></th></tr></thead>
      <tbody id="itembody"></tbody>
    </table>
    <button class="btn sm gray" type="button" onclick="addRow()"><svg class="icon"><use href="#ic-plus"/></svg> เพิ่มรายการ</button>
    <br><br>
    <button class="btn" type="submit"><svg class="icon"><use href="#ic-save"/></svg> บันทึกใบเบิก</button>
    <a class="btn gray" href="/requisitions">ยกเลิก</a>
  </form>
</div>

<script>
  // ข้อมูลวัสดุในระบบ: id, ชื่อ, หน่วย, คงเหลือ
  var MATS = [
    {% for it in items %}{id:{{ it.id }}, name:{{ it.name|tojson }}, unit:{{ it.unit|tojson }}, bal:{{ mat_balance(it) }}},
    {% endfor %}
  ];
  function matOptions() {
    return '<option value="">— เลือกวัสดุ หรือพิมพ์ชื่อใหม่ —</option>' +
      MATS.map(function(m){return '<option value="'+m.id+'">'+m.name+' (คงเหลือ '+m.bal+' '+m.unit+')</option>';}).join('');
  }
  function addRow(name, qty, unit){
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><select onchange="pick(this)" style="margin-bottom:4px;">'+matOptions()+'</select>'+
        '<input name="item_name" placeholder="ชื่อวัสดุ" required>'+
        '<input type="hidden" name="item_mid" value=""></td>'+     /* มีทุกแถวเสมอ เพื่อให้ index ตรงกัน */
      '<td><input name="item_qty" type="number" step="0.01" min="0" value="1" style="width:90px;"></td>'+
      '<td><input name="item_unit" value="หน่วย" style="width:90px;"></td>'+
      '<td class="bal muted">-</td>'+
      '<td><button class="btn red sm" type="button" onclick="this.closest(\'tr\').remove()"><svg class="icon"><use href="#ic-trash"/></svg></button></td>';
    document.getElementById('itembody').appendChild(tr);
    if(name){
      tr.querySelector('input[name=item_name]').value = name;
      if(qty)  tr.querySelector('input[name=item_qty]').value = qty;
      if(unit) tr.querySelector('input[name=item_unit]').value = unit;
      // จับคู่วัสดุที่มีอยู่ในคลังโดยอัตโนมัติ (ชื่อตรงกัน) -> ผูก id + คงเหลือ
      var key = String(name).trim().toLowerCase();
      var m = MATS.find(function(x){ return (x.name||'').trim().toLowerCase() === key; });
      if(m){
        tr.querySelector('select').value = m.id;
        tr.querySelector('input[name=item_mid]').value = m.id;
        tr.querySelector('input[name=item_unit]').value = unit || m.unit;
        tr.querySelector('.bal').textContent = m.bal + ' ' + m.unit;
      }
    }
    return tr;
  }
  function reqScan(input, url, busy){
    if(!input.files || !input.files[0]) return;
    var msg = document.getElementById('reqScanMsg');
    msg.innerHTML = '<span class="spin"></span> ' + busy;
    var fd = new FormData(); fd.append('file', input.files[0]);
    fetch(url, {method:'POST', body:fd}).then(function(r){ return r.json(); }).then(function(d){
      input.value = '';
      if(d && d.error){ msg.textContent = d.error; return; }
      var items = (d && d.items) || [];
      if(!items.length){ msg.textContent = 'อ่านรายการจากรูปไม่ได้ — ลองถ่ายให้ชัด/ตรงขึ้น หรือเพิ่มแถวเอง'; return; }
      items.forEach(function(it){ addRow(it.name, it.qty, it.unit); });
      msg.textContent = 'เพิ่ม ' + items.length + ' รายการแล้ว — โปรดตรวจ/แก้ก่อนบันทึก';
    }).catch(function(){ input.value=''; msg.textContent = 'อ่านรูปไม่สำเร็จ ลองใหม่อีกครั้ง'; });
  }
  function pick(sel){
    var m = MATS.find(function(x){return x.id==sel.value;});
    var tr = sel.closest('tr');
    if(m){
      tr.querySelector('input[name=item_name]').value = m.name;
      tr.querySelector('input[name=item_unit]').value = m.unit;
      tr.querySelector('.bal').textContent = m.bal + ' ' + m.unit;
      tr.querySelector('input[name=item_mid]').value = m.id;
    } else {
      tr.querySelector('.bal').textContent='-';
      tr.querySelector('input[name=item_mid]').value = '';
    }
  }
  document.querySelectorAll('input[data-date]').forEach(function(el){
    el.addEventListener('input', function(){
      var v=this.value.replace(/\D/g,'').slice(0,8), o=v;
      if(v.length>2)o=v.slice(0,2)+'/'+v.slice(2);
      if(v.length>4)o=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
      if(this.value!==o)this.value=o;
    });
  });
  addRow();  // เริ่มต้น 1 แถว
</script>
{% endblock %}
