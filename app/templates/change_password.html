<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D-Doc | เปลี่ยนรหัสผ่าน</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    @font-face { font-family:"Prompt"; font-weight:400; src:url("/static/fonts/Prompt-Regular.ttf") format("truetype"); }
    @font-face { font-family:"Prompt"; font-weight:600; src:url("/static/fonts/Prompt-SemiBold.ttf") format("truetype"); }
    @font-face { font-family:"Prompt"; font-weight:700; src:url("/static/fonts/Prompt-Bold.ttf") format("truetype"); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:"Prompt","Sarabun","Segoe UI",sans-serif; background:#F5F6FA; color:#202224; padding:20px; }
    .card { background:#fff; width:100%; max-width:400px; border-radius:18px; padding:30px 28px;
      box-shadow:0 12px 34px rgba(16,24,40,.12); border:1px solid #eceef3; }
    h1 { font-size:21px; margin:0 0 4px; }
    .sub { color:#7b8190; font-size:14px; margin-bottom:14px; }
    label { display:block; margin:12px 0 5px; font-weight:600; font-size:15px; }
    input { width:100%; padding:10px 12px; border:1px solid #dfe3ea; border-radius:10px; font-size:16px; font-family:inherit; }
    input:focus { outline:none; border-color:#4880FF; box-shadow:0 0 0 3px rgba(72,128,255,.18); }
    .btn { width:100%; margin-top:20px; background:#4880FF; color:#fff; border:none; padding:11px;
      border-radius:11px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn:hover { background:#3568e0; }
    .err { background:#fde8e8; color:#b91c1c; border:1px solid #f7caca; padding:10px 13px; border-radius:10px; font-size:14.5px; margin-bottom:6px; }
    .warn { background:#fff8ec; color:#92610a; border:1px solid #ffe2ad; padding:10px 13px; border-radius:10px; font-size:14.5px; margin-bottom:10px; }
    .back { display:block; text-align:center; margin-top:14px; color:#5a6a85; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/account/password">
    <h1>เปลี่ยนรหัสผ่าน</h1>
    <div class="sub">{{ name }}</div>
    {% if must_change %}<div class="warn">⚠️ นี่เป็นการเข้าใช้ครั้งแรก กรุณาตั้งรหัสผ่านใหม่ของคุณเองก่อนใช้งาน</div>{% endif %}
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>รหัสผ่านเดิม</label>
    <input name="current" type="password" autocomplete="current-password" required autofocus>
    <label>รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
    <input name="new1" type="password" autocomplete="new-password" required>
    <label>ยืนยันรหัสผ่านใหม่</label>
    <input name="new2" type="password" autocomplete="new-password" required>
    <button class="btn" type="submit">บันทึกรหัสผ่านใหม่</button>
    {% if not must_change %}
    <a class="back" href="{{ '/admin-console' if is_super else '/' }}">← กลับ</a>
    {% else %}
    <a class="back" href="/logout">ออกจากระบบ</a>
    {% endif %}
  </form>
</body>
</html>
