# nginx reverse proxy สำหรับ D-Doc
# วางไฟล์นี้ที่ /etc/nginx/sites-available/ddoc แล้ว ln -s ไป sites-enabled/
# ใส่โดเมนจริงที่ server_name (ถ้ายังไม่มีโดเมน ใช้ _ ไปก่อน แล้วเข้าด้วย IP)
server {
    listen 80;
    server_name _;                 # <-- เปลี่ยนเป็นโดเมนของคุณ เช่น app.example.com
    client_max_body_size 30M;      # รองรับอัปโหลดไฟล์ PDF/Word

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
